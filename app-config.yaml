# -------------------------------------------------------------------
# CONFIGURATION DE BASE DE TON APPLICATION BACKSTAGE
# -------------------------------------------------------------------
app:
  title: Scaffolded Backstage App
  # Le frontend doit OBLIGATOIREMENT utiliser un port DIFFERENT du backend.
  baseUrl: http://localhost:3000

organization:
  name: My Company

# -------------------------------------------------------------------
# BACKEND CONFIG – ADAPTÉ POUR POSTGRESQL
# -------------------------------------------------------------------
backend:
  baseUrl: http://localhost:7007

  # Le backend écoute sur le port 7007 (par défaut Backstage)
  listen:
    host: 0.0.0.0
    port: 7007

  csp:
    connect-src: ["'self'", 'http:', 'https:']

  cors:
    # Le frontend (port 3000) a le droit d'appeler le backend (7007)
    origin: http://localhost:3000
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true

  # -----------------------------------------------------------------
  # CONFIGURATION BDD – POSTGRESQL (STABLE, RECOMMANDÉ)
  # -----------------------------------------------------------------
  database:
    client: pg
    connection:
      host: postgres        # Poste local → Docker expose 5432
      port: 5432
      user: backstage        # Créé dans ton conteneur postgres
      password: backstage    # Mot de passe annoncé
      database: backstage    # Nom de la base

  # -------------------------------------------------------------------
# INTÉGRATION GITHUB
# -------------------------------------------------------------------
integrations:
  github:
    - host: github.com
      token: ${GITHUB_TOKEN}

# -------------------------------------------------------------------
# PROXY (désactivé ici)
# -------------------------------------------------------------------
proxy: {}

# -------------------------------------------------------------------
# TECHDOCS – MODE LOCAL (OK POUR DEV)
# -------------------------------------------------------------------
techdocs:
  builder: local
  generator:
    runIn: docker
  publisher:
    type: local

# -------------------------------------------------------------------
# AUTH – MODE INVITE PAR DÉFAUT
# -------------------------------------------------------------------
auth:
  providers:
    guest: {}

# -------------------------------------------------------------------
# SCAFFOLDER – PAR DÉFAUT
# -------------------------------------------------------------------
scaffolder: {}

# -------------------------------------------------------------------
# CATALOG – ENTITÉS LOCALES D’EXEMPLES
# -------------------------------------------------------------------
catalog:
  import:
    entityFilename: catalog-info.yaml
    pullRequestBranchName: backstage-integration

  rules:
    - allow: [Component, System, API, Resource, Location]

  locations:
    - type: file
      target: ../../examples/entities.yaml

    - type: file
      target: ../../examples/template/template.yaml
      rules:
        - allow: [Template]

    - type: file
      target: ../../examples/org.yaml
      rules:
        - allow: [User, Group]

# -------------------------------------------------------------------
# PERMISSIONS
# -------------------------------------------------------------------
permission:
  enabled: true

# -------------------------------------------------------------------
# KUBERNETES – TON CLUSTER AKS
# -------------------------------------------------------------------
kubernetes:
  serviceLocatorMethod:
    type: multiTenant
  clusterLocatorMethods:
    - type: config
      clusters:
        - name: aks-k8srnddevops-dev-eu1-001
          url: https://aks-k8srnddevops-dev-eu1-001.privatelink.westeurope.azmk8s.io:443
          authProvider: azure
          skipTLSVerify: true
          skipMetricsLookup: true
